<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <style>
    :root { --bg:#060606; --card:#111111; --text:#f5f5f5; --muted:#b8b8b8; --accent:#bcff00; --border:rgba(255,255,255,0.12); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:radial-gradient(circle at top, rgba(188,255,0,0.08), transparent 30%), var(--bg); color:var(--text); font-family:Arial, sans-serif; }
    .card { width:min(720px,100%); padding:48px 32px; border-radius:28px; background:var(--card); border:1px solid var(--border); box-shadow:0 24px 70px rgba(0,0,0,0.35); text-align:center; }
    .icon { width:72px; height:72px; margin:0 auto 20px; border-radius:50%; display:grid; place-items:center; color:#0b0b0b; background:var(--accent); font-size:32px; font-weight:700; }
    h1 { margin:0 0 16px; font-size:clamp(2.2rem, 4vw, 3.8rem); line-height:1.1; }
    p { margin:0 auto 14px; max-width:52ch; color:var(--muted); font-size:1.05rem; line-height:1.7; }
    .actions { margin-top:30px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; justify-content:center; min-width:190px; padding:14px 22px; border-radius:999px; text-decoration:none; font-weight:700; transition:0.2s ease; }
    .btn-primary { background:var(--accent); color:#0b0b0b; }
    .btn-secondary { border:1px solid var(--border); color:var(--text); background:transparent; }
    .btn:hover { transform:translateY(-1px); }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <h1>Thank you for reaching out</h1>
    <p>Your form has been submitted successfully. Our team will review your request and get back to you within 24 hours.</p>
    <p>If you want to continue browsing, you can go back to the main page.</p>
    <div class="actions">
      <a class="btn btn-primary" href="index.html">Back to Website</a>
    </div>
  </main>
</body>
</html>
